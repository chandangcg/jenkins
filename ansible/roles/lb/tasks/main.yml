# ... (previous installation tasks remain the same)
- name: Initialize Database Schema
  mysql_query:
    login_db: "{{ db_name }}"
    query: |
      CREATE TABLE IF NOT EXISTS users (
        id INT AUTO_INCREMENT PRIMARY KEY,
        username VARCHAR(255) NOT NULL,
        password VARCHAR(255) NOT NULL
      );
    login_unix_socket: /var/run/mysqld/mysqld.sock
  become: yes
  
- name: Create DB
  mysql_db:
    name: "{{ db_name }}"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock

- name: Create Users Table
  mysql_query:
    login_db: "{{ db_name }}"
    query: "CREATE TABLE IF NOT EXISTS users (id INT AUTO_INCREMENT PRIMARY KEY, username VARCHAR(255), password VARCHAR(255))"
    login_unix_socket: /var/run/mysqld/mysqld.sock

- name: Create DB user
  mysql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    priv: "{{ db_name }}.*:ALL"
    host: "%"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
# ... (Nginx tasks remain the same)