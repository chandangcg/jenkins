- name: Ensure deployment directory exists
  file:
    path: "{{ deploy_path }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  become: yes

- name: Copy application files
  copy:
    src: app/
    dest: "{{ deploy_path }}/"
  become: yes

- name: Deploy environment configuration
  template:
    src: env.j2
    dest: "{{ deploy_path }}/.env"
  become: yes

- name: Install NodeSource repo (Node 18)
  shell: curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
  args:
    executable: /bin/bash
  become: yes

- name: Install Node.js
  apt:
    name: nodejs
    state: present
    update_cache: yes
  become: yes

- name: Install PM2
  npm:
    name: pm2
    global: yes
  become: yes

- name: Install app dependencies
  npm:
    path: "{{ deploy_path }}"

- name: Start Node app with PM2
  shell: |
    pm2 start app.js --name nodeapp || pm2 restart nodeapp
  args:
    chdir: "{{ deploy_path }}"
  become: yes